<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ACHTECK 재종 컨버전</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;--surface:#ffffff;--surface2:#eef1f5;--border:#d8dde6;
  --accent:#d44000;--accent2:#c07000;
  --text:#1a1e2a;--text2:#4a5368;--text3:#8b95a8;
  --grade-color:#0077cc;--chip-color:#2a8a4a;
  --p-color:#1565c0;--m-color:#b8860b;--k-color:#c62828;
  --n-color:#2e7d32;--s-color:#bf360c;--h-color:#546e7a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}

.header{background:#ffffff;border-bottom:2px solid var(--accent);padding:16px 20px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);line-height:1;}
.logo span{color:var(--text3);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:400;letter-spacing:1px;display:block;margin-top:2px;}
.badge-count{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap;}

.search-wrap{position:relative;}
.search-input{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 50px 14px 48px;font-size:16px;color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:1px;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input::placeholder{color:var(--text3);font-weight:400;font-size:14px;letter-spacing:0;font-family:'Noto Sans KR',sans-serif;}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,64,0,.1);}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none;}
.clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--border);border:none;border-radius:50%;width:26px;height:26px;color:var(--text2);font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:background .15s;}
.clear-btn:hover{background:var(--accent);color:#fff;}

.filter-row{display:flex;gap:6px;overflow-x:auto;padding:10px 20px 0;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-chip.active{border-color:var(--accent);background:rgba(212,64,0,.07);color:var(--accent);}
.brand-row{display:flex;gap:6px;overflow-x:auto;padding:8px 20px 0;scrollbar-width:none;}
.brand-row::-webkit-scrollbar{display:none;}
.brand-chip{flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap;}
.brand-chip.active{border-color:var(--accent2);color:var(--accent2);background:rgba(192,112,0,.07);}

.main{padding:16px 16px 100px;max-width:600px;margin:0 auto;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.35;}
.empty-title{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:8px;}
.empty-desc{font-size:13px;line-height:1.7;}
.example-queries{margin-top:20px;display:flex;flex-direction:column;gap:8px;}
.example-q{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;transition:all .15s;text-align:left;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.example-q:hover{border-color:var(--accent);color:var(--accent);background:rgba(212,64,0,.04);}

.result-header{display:flex;align-items:center;margin-bottom:14px;padding:0 2px;}
.result-count{font-size:13px;color:var(--text2);}
.result-count strong{color:var(--accent);font-family:'JetBrains Mono',monospace;}
.section-header{display:flex;align-items:center;gap:8px;margin:20px 0 10px;padding:0 2px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);}
.section-line{flex:1;height:1px;background:var(--border);}
.section-dot{width:6px;height:6px;border-radius:50%;}
.section-dot.grade{background:var(--grade-color);}
.section-dot.chip{background:var(--chip-color);}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s,box-shadow .15s,transform .1s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.card.grade-card::before{background:var(--grade-color);}
.card.chip-card::before{background:var(--chip-color);}
.card:hover{border-color:#b0bac8;box-shadow:0 2px 12px rgba(0,0,0,.08);transform:translateY(-1px);}

/* ISO 색상 세로 줄 */
.card.iso-P::before{background:#1565c0;}
.card.iso-M::before{background:#b8860b;}
.card.iso-K::before{background:#c62828;}
.card.iso-N::before{background:#2e7d32;}
.card.iso-S::before{background:#bf360c;}
.card.iso-H::before{background:#546e7a;}

/* 경쟁사 */
.comp-section{display:flex;align-items:center;gap:10px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--border);}
.comp-label{font-size:10px;color:var(--text3);letter-spacing:.8px;min-width:42px;}
.brand-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(192,112,0,.1);color:var(--accent2);border:1px solid rgba(192,112,0,.3);letter-spacing:.5px;}
.comp-grade-text{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#1a1e2a;letter-spacing:1px;}
.comp-grade-text .hl{color:#1a1e2a;}

/* 공용 탭 */
.tab-bar{display:flex;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.tab-btn{flex:1;padding:7px 0;border:none;background:var(--surface2);color:var(--text3);font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.tab-btn+.tab-btn{border-left:1px solid var(--border);}
.tab-btn.active-grade{background:#e8f3fb;color:var(--grade-color);}
.tab-btn.active-chip{background:#e8f5eb;color:var(--chip-color);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ISO 블록 */
.iso-block{}
.iso-block+.iso-block{border-top:1px dashed var(--border);padding-top:10px;margin-top:6px;}
.iso-block-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.iso-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0;}
.iso-P{background:#fff;color:#1565c0;border:1.5px solid #1565c0;}
.iso-M{background:#fff;color:#b8860b;border:1.5px solid #b8860b;}
.iso-K{background:#fff;color:#c62828;border:1.5px solid #c62828;}
.iso-N{background:#fff;color:#2e7d32;border:1.5px solid #2e7d32;}
.iso-S{background:#fff;color:#bf360c;border:1.5px solid #bf360c;}
.iso-H{background:#fff;color:#546e7a;border:1.5px solid #546e7a;}
.iso-range-text{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.app-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;background:#f0e8f8;color:var(--n-color);border:1px solid #c9a8e0;}
.coating-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;background:rgba(212,64,0,.07);color:var(--accent);border:1px solid rgba(212,64,0,.2);margin-left:auto;}

/* 추천 순위 */
.rank-list{display:flex;flex-direction:column;gap:6px;}
.rank-row{display:flex;align-items:center;gap:10px;}
.rank-badge{flex-shrink:0;width:52px;display:flex;align-items:center;justify-content:center;padding:4px 0;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.5px;font-family:'JetBrains Mono',monospace;}
.rank-1{background:rgba(212,64,0,.1);color:var(--accent);border:1px solid rgba(212,64,0,.3);}
.rank-2{background:rgba(192,112,0,.1);color:var(--accent2);border:1px solid rgba(192,112,0,.28);}
.rank-3{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.rank-n{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.rank-grades{display:flex;flex-wrap:wrap;gap:5px;}
.rank-chip{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;letter-spacing:.8px;padding:4px 12px;border-radius:7px;}
.grade-chip{background:#fff;color:var(--grade-color);border:1.5px solid var(--grade-color);}
.chip-chip{background:#fff;color:var(--chip-color);border:1.5px solid var(--chip-color);}

/* ISO 색상 재종 추천 칩 */
.iso-chip-P{background:#fff;color:#1565c0;border:1.5px solid #1565c0;}
.iso-chip-M{background:#fff;color:#b8860b;border:1.5px solid #b8860b;}
.iso-chip-K{background:#fff;color:#c62828;border:1.5px solid #c62828;}
.iso-chip-N{background:#fff;color:#2e7d32;border:1.5px solid #2e7d32;}
.iso-chip-S{background:#fff;color:#bf360c;border:1.5px solid #bf360c;}
.iso-chip-H{background:#fff;color:#546e7a;border:1.5px solid #546e7a;}

.no-result{text-align:center;padding:50px 20px;color:var(--text3);font-size:14px;}

/* 단일 타입 칩브레이커 레이블 */
.chip-type-label{
  margin-left:auto;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:5px;letter-spacing:.3px;
  font-family:'Noto Sans KR',sans-serif;
}
.chip-type-label.neg{background:#e8f5eb;color:var(--chip-color);border:1px solid #9ed4a6;}
.chip-type-label.pos{background:#eef5ff;color:#1a6fcc;border:1px solid #a0c0ee;}

/* 단일 공정 재종 레이블 */
.proc-type-label{
  margin-left:auto;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:5px;letter-spacing:.3px;
  font-family:'Noto Sans KR',sans-serif;
}
.proc-type-label.turning{background:#e8f3fb;color:var(--grade-color);border:1px solid #a8ccee;}
.proc-type-label.milling{background:#fff0dd;color:var(--m-color);border:1px solid #e8c888;}
.fab{position:fixed;bottom:24px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(212,64,0,.35);transition:all .2s;z-index:50;}
.fab:hover{transform:scale(1.1);}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">ACHTECK<span>Grade Conversion Tool</span></div>
    <div class="badge-count" id="total-count">DB: 0건</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input"
      placeholder="경쟁사 재종 또는 칩브레이커 입력 (예: GC4225, MF2, PR1225)"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="clear-btn" id="clear-btn">✕</button>
  </div>
</div>

<div class="filter-row">
  <button class="filter-chip active" data-filter="all">전체</button>

  <button class="filter-chip" data-filter="milling">밀링</button>
</div>
<div class="brand-row">

  <button class="brand-chip" data-brand="KENNAMETAL">KENNAMETAL</button>
  <button class="brand-chip" data-brand="KYOCERA">KYOCERA</button>
  <button class="brand-chip" data-brand="ISCAR">ISCAR</button>
  <button class="brand-chip" data-brand="MITSUBISHI">MITSUBISHI</button>
  <button class="brand-chip" data-brand="TUNGALOY">TUNGALOY</button>

  <button class="brand-chip" data-brand="DJTOL">DJTOL</button>
  <button class="brand-chip" data-brand="GESAC">GESAC</button>
</div>

<div class="main">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">⚙️</div>
    <div class="empty-title">경쟁사 재종을 입력하세요</div>
    <div class="empty-desc">재종명 또는 칩브레이커 코드 입력 시<br>ACHTECK 추천 순위를 바로 확인할 수 있습니다</div>
    <div class="example-queries">
      <button class="example-q" onclick="setSearch('PR1225')">PR1225 · 터닝+밀링 (Kyocera)</button>
      <button class="example-q" onclick="setSearch('MF2')">MF2 · 네거티브+포지티브 (Seco)</button>
      <button class="example-q" onclick="setSearch('GC4225')">GC4225 (Sandvik)</button>
      <button class="example-q" onclick="setSearch('MF')">MF 칩브레이커 (Sandvik)</button>
      <button class="example-q" onclick="setSearch('QF')">QF 칩브레이커 (Sandvik)</button>
    </div>
  </div>
  <div id="results-container" style="display:none;"></div>
</div>

<button class="fab" id="fab-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

const GRADES = RAW.grades;
const CHIPS  = RAW.chips;

const COATING_LABEL = {cvd:'CVD',pvd:'PVD',uncoated:'비코팅',cermet:'서메트',cbn:'CBN',pcd:'PCD',mixed:'코팅'};
const APP_LABEL     = {'Finishing':'정삭','Semi finishing':'준정삭','Medium':'중삭','Roughing':'황삭','Heavy roughing':'중황삭'};
const RANK_LABEL    = ['1추천','2추천','3추천','4추천','5추천'];

let currentFilter='all', currentBrand='all', currentQuery='', searchTimer=null, cardSeq=0;

document.getElementById('total-count').textContent =
  `DB: ${(GRADES.length+CHIPS.length).toLocaleString()}건`;

const searchInput = document.getElementById('search-input');
const clearBtn    = document.getElementById('clear-btn');

searchInput.addEventListener('input', e => {
  currentQuery = e.target.value.trim();
  clearBtn.style.display = currentQuery ? 'flex' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, currentQuery.length < 2 ? 0 : 180);
});
clearBtn.addEventListener('click', () => {
  searchInput.value=''; currentQuery='';
  clearBtn.style.display='none'; showEmpty(); searchInput.focus();
});
document.querySelector('.filter-row').addEventListener('click', e => {
  const c=e.target.closest('.filter-chip'); if(!c) return;
  document.querySelectorAll('.filter-chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active'); currentFilter=c.dataset.filter;
  if(currentQuery) doSearch();
});
document.querySelector('.brand-row').addEventListener('click', e => {
  const c=e.target.closest('.brand-chip'); if(!c) return;
  document.querySelectorAll('.brand-chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active'); currentBrand=c.dataset.brand;
  if(currentQuery) doSearch();
});

function setSearch(q){ searchInput.value=q; currentQuery=q; clearBtn.style.display='flex'; doSearch(); searchInput.focus(); }
function norm(s){ return s.replace(/[\s\-_\.]/g,'').toUpperCase(); }
function hl(text,q){ return norm(text).includes(norm(q))?`<span class="hl">${esc(text)}</span>`:esc(text); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function rankBadge(i){
  const cls=['rank-1','rank-2','rank-3','rank-n'][Math.min(i,3)];
  const lbl=i<RANK_LABEL.length?RANK_LABEL[i]:`${i+1}추천`;
  return `<span class="rank-badge ${cls}">${lbl}</span>`;
}
function renderRankList(ranked, chipCls){
  return '<div class="rank-list">'+ranked.map((grp,i)=>
    `<div class="rank-row">${rankBadge(i)}<div class="rank-grades">${
      grp.map(g=>`<span class="rank-chip ${chipCls}">${esc(g)}</span>`).join('')
    }</div></div>`
  ).join('')+'</div>';
}

// ISO 블록 렌더 (재종용: iso_range + coating)
function renderGradeIsoBlock(tab){
  const isoClass   = tab.iso_class||'';
  const coatingLbl = COATING_LABEL[tab.coating]||tab.coating||'';
  const chipCls    = isoClass ? `grade-chip iso-chip-${isoClass}` : 'grade-chip';
  return `<div class="iso-block">
    <div class="iso-block-header">
      ${isoClass?`<span class="iso-badge iso-${isoClass}">${isoClass}</span>`:''}
      ${tab.iso_range?`<span class="iso-range-text">${esc(tab.iso_range)}</span>`:''}
      ${coatingLbl?`<span class="coating-badge">${coatingLbl}</span>`:''}
    </div>
    ${renderRankList(tab.achteck_ranked, chipCls)}
  </div>`;
}

// ISO 블록 렌더 (칩브레이커용: iso_class + application)
function renderChipIsoBlock(tab){
  const isoClass = tab.iso_class||'';
  const appKo    = APP_LABEL[tab.application]||tab.application||'';
  const chipCls  = isoClass ? `chip-chip iso-chip-${isoClass}` : 'chip-chip';
  return `<div class="iso-block">
    <div class="iso-block-header">
      ${isoClass?`<span class="iso-badge iso-${isoClass}">${isoClass}</span>`:''}
      ${appKo?`<span class="app-badge">${appKo}</span>`:''}
    </div>
    ${renderRankList(tab.achteck_ranked, chipCls)}
  </div>`;
}

// 탭 렌더 공용
function renderTabCard(id, leftLabel, rightLabel, leftTabs, rightTabs, renderBlock, activeClass, defaultLeft){
  const hasBoth = leftTabs.length>0 && rightTabs.length>0;
  const leftActive = defaultLeft || !rightTabs.length;

  if(!hasBoth){
    const tabs = leftTabs.length ? leftTabs : rightTabs;
    return tabs.map(t=>renderBlock(t)).join('');
  }

  // ISO가 단일할 때만 data-iso 설정 (혼합이면 빈값 → 고정색 유지)
  const lIsos = [...new Set(leftTabs.map(t=>t.iso_class||''))];
  const rIsos = [...new Set(rightTabs.map(t=>t.iso_class||''))];
  const lIso = lIsos.length===1 ? lIsos[0] : '';
  const rIso = rIsos.length===1 ? rIsos[0] : '';

  const lActive = leftActive ? `active-${activeClass}` : '';
  const rActive = !leftActive ? `active-${activeClass}` : '';
  const lPanel  = leftActive ? 'active' : '';
  const rPanel  = !leftActive ? 'active' : '';

  return `
    <div class="tab-bar">
      <button class="tab-btn ${lActive}" data-card="${id}" data-side="left" data-iso="${lIso}">${leftLabel}</button>
      <button class="tab-btn ${rActive}" data-card="${id}" data-side="right" data-iso="${rIso}">${rightLabel}</button>
    </div>
    <div class="tab-panel ${lPanel}" data-card="${id}" data-side="left">
      ${leftTabs.map(t=>renderBlock(t)).join('')}
    </div>
    <div class="tab-panel ${rPanel}" data-card="${id}" data-side="right">
      ${rightTabs.map(t=>renderBlock(t)).join('')}
    </div>`;
}

function doSearch(){
  const q=currentQuery.trim(); if(!q){ showEmpty(); return; }
  const nq=norm(q);

  let grades=GRADES.filter(g=>{
    if(currentFilter==='chipbreaker') return false;
    if(currentBrand!=='all'&&g.brand!==currentBrand) return false;
    if(currentFilter==='turning'&&!g.turning.length) return false;
    if(currentFilter==='milling'&&!g.milling.length) return false;
    return norm(g.competitor_grade).includes(nq);
  });

  let chips=CHIPS.filter(c=>{
    if(currentFilter==='grade'||currentFilter==='turning'||currentFilter==='milling') return false;
    if(currentBrand!=='all'&&c.brand!==currentBrand) return false;
    return norm(c.competitor_chip).includes(nq);
  });

  const sortFn=(a,b)=>{
    const at=norm(a.competitor_grade||a.competitor_chip);
    const bt=norm(b.competitor_grade||b.competitor_chip);
    return (at===nq?0:1)-(bt===nq?0:1);
  };
  grades.sort(sortFn); chips.sort(sortFn);
  renderResults(grades,chips,q);
}

function showEmpty(){
  document.getElementById('empty-state').style.display='block';
  document.getElementById('results-container').style.display='none';
}

function renderResults(grades,chips,q){
  document.getElementById('empty-state').style.display='none';
  const container=document.getElementById('results-container');
  container.style.display='block';
  cardSeq=0;

  if(!grades.length&&!chips.length){
    container.innerHTML=`<div class="no-result">🔍 <strong style="color:var(--text2)">"${esc(q)}"</strong> 결과 없음<br><span style="font-size:12px;display:block;margin-top:6px">브랜드 필터를 전체로 변경하거나 검색어를 확인해 주세요</span></div>`;
    return;
  }

  let html=`<div class="result-header"><div class="result-count">총 <strong>${grades.length+chips.length}</strong>건 검색됨</div></div>`;

  if(grades.length){
    html+=`<div class="section-header"><span class="section-dot grade"></span><span>재종 변환 · ${grades.length}건</span><span class="section-line"></span></div>`;
    grades.forEach(g=>{ html+=renderGradeCard(g,q); });
  }
  if(chips.length){
    html+=`<div class="section-header"><span class="section-dot chip"></span><span>칩브레이커 · ${chips.length}건</span><span class="section-line"></span></div>`;
    chips.forEach(c=>{ html+=renderChipCard(c,q); });
  }

  container.innerHTML=html;

  // 탭 이벤트 위임
  container.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cid=btn.dataset.card, side=btn.dataset.side;
      const activeClass = btn.closest('.card').classList.contains('grade-card') ? 'grade' : 'chip';
      container.querySelectorAll(`.tab-btn[data-card="${cid}"]`).forEach(b=>b.classList.remove('active-grade','active-chip'));
      container.querySelectorAll(`.tab-panel[data-card="${cid}"]`).forEach(p=>p.classList.remove('active'));
      btn.classList.add(`active-${activeClass}`);
      container.querySelector(`.tab-panel[data-card="${cid}"][data-side="${side}"]`).classList.add('active');

      // 세로 줄 색상: data-iso 속성 직접 사용
      const card = btn.closest('.card');
      const iso = btn.dataset.iso||'';
      card.classList.remove('iso-P','iso-M','iso-K','iso-N','iso-S','iso-H');
      if(iso) card.classList.add(`iso-${iso}`);
    });
  });
}

function getRepIso(tabs){
  if(!tabs||!tabs.length) return '';
  const isos = [...new Set(tabs.map(t=>t.iso_class||''))];
  return isos.length===1 ? isos[0] : '';  // 단일 ISO일 때만 반환
}

function renderGradeCard(g,q){
  const id='g'+(cardSeq++);
  const hasBoth = g.turning.length>0 && g.milling.length>0;
  const defaultLeft = currentFilter!=='milling' || !g.turning.length;
  const inner = renderTabCard(id,'⚙ 터닝','⬡ 밀링',g.turning,g.milling,renderGradeIsoBlock,'grade',defaultLeft);
  const isTurning = g.turning.length>0;
  const typeLabel = hasBoth ? '' :
    isTurning ? `<span class="proc-type-label turning">⚙ 터닝</span>`
              : `<span class="proc-type-label milling">⬡ 밀링</span>`;
  const activeTabs = defaultLeft ? g.turning : g.milling;
  const repIso = getRepIso(activeTabs.length ? activeTabs : (g.turning.length ? g.turning : g.milling));
  return `<div class="card grade-card${repIso?' iso-'+repIso:''}" data-id="${id}">
    <div class="comp-section">
      <span class="comp-label">경쟁사</span>
      <span class="brand-tag">${esc(g.brand)}</span>
      <span class="comp-grade-text">${hl(g.competitor_grade,q)}</span>
      ${typeLabel}
    </div>
    ${inner}
  </div>`;
}

function renderChipCard(c,q){
  const id='c'+(cardSeq++);
  const hasBoth = c.negative.length>0 && c.positive.length>0;
  const inner = renderTabCard(id,'◈ 네거티브','◇ 포지티브',c.negative,c.positive,renderChipIsoBlock,'chip',true);
  const isNeg = c.negative.length>0;
  const typeLabel = hasBoth ? '' :
    isNeg ? `<span class="chip-type-label neg">◈ 네거티브</span>`
           : `<span class="chip-type-label pos">◇ 포지티브</span>`;
  const activeTabs = c.negative.length ? c.negative : c.positive;
  const repIso = getRepIso(activeTabs);
  return `<div class="card chip-card${repIso?' iso-'+repIso:''}" data-id="${id}">`+
    `<div class="comp-section">
      <span class="comp-label">경쟁사</span>
      <span class="brand-tag">${esc(c.brand)}</span>
      <span class="comp-grade-text">${hl(c.competitor_chip,q)}</span>
      ${typeLabel}
    </div>
    ${inner}
  </div>`;
}

window.addEventListener('scroll',()=>{
  document.getElementById('fab-top').style.display=window.scrollY>300?'flex':'none';
});
</script>
</body>
